<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn Rewards Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Primary Ad Network (GigaPub) -->
    <script src="https://ad.gigapub.tech/script?id=5930"></script>
    <!-- Fallback Ad Network (LibTL) -->
    <script src='//libtl.com/sdk.js' data-zone='10525553' data-sdk='show_10525553'></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #FFD700;
            --text-main: #ffffff;
            --text-muted: #8b8b9e;
            --success: #00e676;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- Animated Background Particles --- */
        .particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: floatUp 10s infinite linear;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* --- Loading Screen --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .loading-text {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loaded #loading-screen { opacity: 0; visibility: hidden; }

        /* --- Main Container --- */
        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 10;
            animation: popIn 0.8s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(50px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- Glassmorphism Balance Card --- */
        .balance-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* Shimmer Effect */
        .balance-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            to { left: 100%; }
        }

        .balance-icon {
            font-size: 32px;
            margin-bottom: 5px;
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .balance-label {
            font-size: 14px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 800;
            margin-top: 5px;
            background: linear-gradient(to bottom, #ffffff, #c4c4c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 210, 255, 0.3);
            transition: transform 0.2s;
        }
        
        /* Task Card */
        .task-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .task-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .task-icon-box {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 215, 0, 0.05));
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: var(--accent);
            margin-right: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .task-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .task-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(0, 114, 255, 0.4);
        }

        /* Ripple Effect */
        .btn::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 10%, transparent 10%);
            transform: scale(10);
            opacity: 0;
            transition: transform 0.5s, opacity 0.5s;
        }
        .btn:active::after {
            transform: scale(0);
            opacity: 1;
            transition: 0s;
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- Toast Notification --- */
        #toast {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1f1f2f;
            border: 1px solid var(--success);
            color: var(--success);
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Error Animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake {
            animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both;
        }
    </style>
</head>
<body>

    <!-- Background Particles Generator -->
    <div class="particles" id="particles"></div>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Loading Assets...</div>
    </div>

    <!-- Main App Container -->
    <div class="container" id="app">
        
        <div class="header" style="text-align: center;">
            <h2 style="font-weight: 600; font-size: 24px; background: linear-gradient(to right, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">REWARD HUB</h2>
        </div>

        <!-- Balance Section -->
        <div class="balance-card">
            <div class="balance-icon">💎</div>
            <div class="balance-label">Your Balance</div>
            <div class="balance-amount" id="balanceDisplay">0</div>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">COINS AVAILABLE</div>
        </div>

        <!-- Task Section -->
        <div class="task-card">
            <div class="task-header">
                <div class="task-icon-box">⚡</div>
                <div>
                    <div class="task-title">Premium Task</div>
                    <div class="task-subtitle">Watch a short video to earn</div>
                </div>
            </div>
            
            <button class="btn btn-primary" id="watchBtn" onclick="initAdProcess()">
                <span id="btnIcon">▶</span>
                <span id="btnText">Watch Ad (+10)</span>
            </button>
            <div style="font-size: 12px; color: var(--text-muted); margin-top: 15px; text-align: center; opacity: 0.7;">
                * High quality ads selected for you
            </div>
        </div>

        <button class="btn btn-close" onclick="window.Telegram.WebApp.close()">✖ Close Window</button>
    </div>

    <!-- Toast -->
    <div id="toast">
        <span style="font-size:18px">✅</span> Reward Added!
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Generate Particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.opacity = Math.random() * 0.5 + 0.2;
            particlesContainer.appendChild(p);
        }

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        
        // UI Initialization
        setTimeout(() => {
            document.body.classList.add('loaded');
            document.getElementById('app').style.display = 'flex';
            if(uid) updateBalance();
        }, 2000);

        // Balance Fetch
        function updateBalance() {
            if(!uid) return;
            fetch(`/api/balance?uid=${uid}`)
            .then(res => res.json())
            .then(data => {
                if(data.balance !== undefined) {
                    animateValue('balanceDisplay', parseInt(document.getElementById('balanceDisplay').innerText) || 0, data.balance, 1000);
                }
            }).catch(e => console.log("Balance fetch error", e));
        }

        // Number Animation
        function animateValue(id, start, end, duration) {
            const obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // --- AD LOGIC START ---
        function initAdProcess() {
            const btn = document.getElementById('watchBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');

            btn.disabled = true;
            btn.classList.remove('shake'); // Remove previous shake class
            btnText.innerText = "Loading Ad...";
            btnIcon.innerText = "⏳";
            btn.style.opacity = "0.8";

            // Step 1: Try GigaPub (Primary)
            if (typeof window.showGiga === 'function') {
                console.log("Attempting GigaPub Ad...");
                window.showGiga("main")
                    .then(() => {
                        console.log("GigaPub Ad Completed");
                        giveReward("GigaPub");
                        resetBtn();
                    })
                    .catch(e => {
                        console.warn("GigaPub Failed:", e);
                        // Step 2: Fallback to LibTL
                        attemptFallbackAd();
                    });
            } else {
                // Step 2: Fallback immediately if GigaPub not found
                console.log("GigaPub not defined, trying Fallback");
                attemptFallbackAd();
            }
        }

        function attemptFallbackAd() {
            const btnText = document.getElementById('btnText');
            btnText.innerText = "Loading Backup Ad...";

            if (typeof show_10525553 === 'function') {
                console.log("Attempting LibTL Ad...");
                show_10525553()
                    .then(() => {
                        console.log("LibTL Ad Completed");
                        giveReward("LibTL");
                        resetBtn();
                    })
                    .catch(e => {
                        console.error("LibTL Failed:", e);
                        handleAdFail();
                    });
            } else {
                console.error("No Ad Networks Available");
                handleAdFail();
            }
        }

        function handleAdFail() {
            const btn = document.getElementById('watchBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            
            btnText.innerText = "Ad Failed (Try Again)";
            btnIcon.innerText = "⚠️";
            btn.style.opacity = "1";
            btn.classList.add('shake'); // Add shake animation
            
            setTimeout(() => {
                resetBtn();
            }, 2000);
        }

        function resetBtn() {
            const btn = document.getElementById('watchBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            
            btn.disabled = false;
            btnText.innerText = "Watch Ad (+10)";
            btnIcon.innerText = "▶";
            btn.style.opacity = "1";
            btn.classList.remove('shake');
        }

        function giveReward(source) {
            fetch('/api/reward', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uid: uid })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    // Animate Balance
                    animateValue('balanceDisplay', parseInt(document.getElementById('balanceDisplay').innerText), data.newBalance, 1500);
                    
                    // Show Toast
                    const toast = document.getElementById("toast");
                    toast.innerHTML = `<span style="font-size:18px">✅</span> +10 Coins Added!`;
                    toast.className = "show";
                    setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
                }
            });
        }
    </script>
</body>
</html>
